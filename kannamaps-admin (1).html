const SUPA_SERVICE='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmeHJkeGZqcXVtYWp4aWt5a2F5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTY5ODAwOCwiZXhwIjoyMDkxMjc0MDA4fQ.GVFP8yHCJDE0XYg-oj5LT62lcjpWBE0aWQ20dg9LCk4';
const{createClient}=supabase;const sb=createClient(SUPA_URL,SUPA_SERVICE);
const ADMIN_PASS='kannamaps2026';
let D={pacientes:[],medicos:[],fornecedores:[],produtos:[],pedidos:[],consultas:[],receitas:[],prontuarios:[],documentos:[]};
let currentTab='pacientes';
function adminLogin(){if(document.getElementById('admin-pw').value===ADMIN_PASS){document.getElementById('s-login').style.display='none';document.getElementById('s-main').style.display='flex';loadAll()}else{document.getElementById('login-err').textContent='Senha incorreta';setTimeout(()=>document.getElementById('login-err').textContent='',3000)}}
async function loadAll(){qs('#status').textContent='Carregando...';const[p,m,f,pr,pe,c,r,pn,doc]=await Promise.all([sb.from('pacientes').select('*').order('criado_em',{ascending:false}),sb.from('medicos').select('*').order('criado_em',{ascending:false}),sb.from('fornecedores').select('*').order('criado_em',{ascending:false}),sb.from('produtos').select('*').order('criado_em',{ascending:false}),sb.from('pedidos').select('*,pedido_itens(*)').order('criado_em',{ascending:false}),sb.from('consultas').select('*').order('data_consulta',{ascending:false}),sb.from('receitas').select('*').order('criado_em',{ascending:false}),sb.from('prontuarios').select('*').order('criado_em',{ascending:false}),sb.from('documentos').select('*').order('enviado_em',{ascending:false})]);D.pacientes=p.data||[];D.medicos=m.data||[];D.fornecedores=f.data||[];D.produtos=pr.data||[];D.pedidos=pe.data||[];D.consultas=c.data||[];D.receitas=r.data||[];D.prontuarios=pn.data||[];D.documentos=doc.data||[];renderStats();renderTab(currentTab);qs('#status').textContent=''}
function renderStats(){qs('#s-pac').textContent=D.pacientes.length;qs('#s-med').textContent=D.medicos.length;qs('#s-forn').textContent=D.fornecedores.length;qs('#s-prod').textContent=D.produtos.length;qs('#s-ped').textContent=D.pedidos.length;qs('#s-con').textContent=D.consultas.length;qs('#s-rec').textContent=D.receitas.length;qs('#s-rev').textContent='R$ '+D.pedidos.reduce((s,p)=>s+(p.total||0),0).toFixed(2)}
function switchTab(t){currentTab=t;document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active',el.dataset.tab===t));closeProf();renderTab(t)}
function renderTab(t){const c=qs('#tab-content');const cfg={pacientes:{cols:['nome','email','cpf','telefone','sintomas','criado_em'],click:'openPaciente'},medicos:{cols:['nome','crm','estado_crm','especialidade','email','valor_consulta','criado_em'],click:'openMedico'},fornecedores:{cols:['nome_fantasia','razao_social','cnpj','responsavel','email','criado_em'],click:'openFornecedor'},produtos:{cols:['nome','categoria','preco','estoque','fornecedor','ativo','criado_em']},pedidos:{cols:['id','status','total','criado_em']},consultas:{cols:['medico','data_consulta','horario','status','valor','criado_em']},receitas:{cols:['diagnostico','produto_prescrito','dosagem','status','criado_em']}};const cf=cfg[t];if(!cf)return;let rows=D[t];c.innerHTML=buildTable(rows,cf.cols,t,cf.click)}
function buildTable(rows,cols,tn,clickFn){if(!rows.length)return'<div class="empty">Nenhum registro</div>';let h='<div class="tw"><input class="search" placeholder="Buscar..." oninput="filterRows(this)"><div class="ts"><table><thead><tr><th>#</th>';cols.forEach(c=>h+='<th>'+fmtCol(c)+'</th>');h+='</tr></thead><tbody>';rows.forEach((r,i)=>{const ss=cols.map(c=>String(r[c]||'')).join(' ').toLowerCase();const cl=clickFn?'onclick="'+clickFn+"('"+r.id+"')"+'" style="cursor:pointer"':'';h+='<tr data-s="'+ss+'" '+cl+'><td class="mono">'+(i+1)+'</td>';cols.forEach(c=>{h+='<td>'+fmtVal(c,r[c])+'</td>'});h+='</tr>'});h+='</tbody></table></div></div><div class="tf">'+rows.length+' registros</div>';return h}
function openPaciente(id){const p=D.pacientes.find(x=>x.id===id);if(!p)return;const cons=D.consultas.filter(c=>c.paciente_id===id);const peds=D.pedidos.filter(o=>o.paciente_id===id);const rxs=D.receitas.filter(r=>r.paciente_id===id);const docs=D.documentos.filter(d=>d.paciente_id===id);const tCons=cons.reduce((s,c)=>s+(c.valor||0),0);const tComp=peds.reduce((s,o)=>s+(o.total||0),0);let h=profHeader(initials(p.nome),p.nome||'Sem nome',p.email||'','');h+=profCards([['R$ '+(tCons+tComp).toFixed(2),'Total gasto'],[cons.length,'Consultas'],[peds.length,'Compras'],[rxs.length,'Receitas']]);h+=section('📋 Dados pessoais',grid([['CPF',p.cpf],['Nascimento',fmtDate(p.nascimento)],['Telefone',p.telefone],['CEP',p.cep],['Endereço',p.endereco],['Sintomas',p.sintomas],['Uso CBD',p.uso_cbd],['Tem receita',p.tem_receita],['Protocolo ANVISA',p.anvisa_protocolo],['Cadastro',fmtDT(p.criado_em)]]));h+=section('📅 Consultas ('+cons.length+')',cons.length?miniTable(['Data','Horário','Médico','Status','Valor'],cons.map(c=>{const med=D.medicos.find(m=>m.id===c.medico_id);return[fmtDate(c.data_consulta),c.horario||'-',med?.nome||c.medico||'-',tag(c.status),'R$ '+(c.valor||0).toFixed(2)]})):'<div class="ps-empty">Nenhuma</div>');h+=section('🛒 Compras ('+peds.length+')',peds.length?miniTable(['Data','Itens','Total','Status','Rastreio'],peds.map(o=>[(fmtDate(o.criado_em)),(o.pedido_itens||[]).map(i=>i.quantidade+'x '+i.nome_produto).join(', ')||'-','R$ '+(o.total||0).toFixed(2),tag(o.status),o.rastreio||'-'])):'<div class="ps-empty">Nenhuma</div>');h+=section('💊 Receitas ('+rxs.length+')',rxs.length?miniTable(['Data','Diagnóstico','Produto','Dosagem','Validade','Status'],rxs.map(r=>[fmtDate(r.criado_em),r.diagnostico||'-',r.produto_prescrito||'-',r.dosagem||'-',fmtDate(r.validade),tag(r.status)])):'<div class="ps-empty">Nenhuma</div>');h+=docSection(id,docs,'paciente',['receita_medica','documento_anvisa','laudo_medico','rg_cnh','comprovante_residencia','outro']);showProfile(h)}
function openMedico(id){const m=D.medicos.find(x=>x.id===id);if(!m)return;const cons=D.consultas.filter(c=>c.medico_id===id);const rxs=D.receitas.filter(r=>r.medico_id===id);const docs=D.documentos.filter(d=>d.paciente_id===id);const tCons=cons.reduce((s,c)=>s+(c.valor||0),0);let h=profHeader(initials(m.nome),m.nome||'Sem nome','CRM '+(m.crm||'?')+'/'+(m.estado_crm||'?')+' · '+(m.especialidade||''),'#2A1A48','#9B4FDE');h+=profCards([['R$ '+tCons.toFixed(2),'Receita consultas'],[cons.length,'Consultas'],[rxs.length,'Receitas emitidas'],['R$ '+(m.valor_consulta||0).toFixed(2),'Valor consulta']]);h+=section('📋 Dados profissionais',grid([['Email',m.email],['Telefone',m.telefone],['Bio',m.bio],['Rating',m.rating],['Horários',m.horarios_disponiveis],['Dias',m.dias_disponiveis],['Cadastro',fmtDT(m.criado_em)]]));h+=section('📅 Consultas ('+cons.length+')',cons.length?miniTable(['Data','Paciente','Status','Valor'],cons.map(c=>{const pac=D.pacientes.find(p=>p.id===c.paciente_id);return[fmtDate(c.data_consulta),pac?.nome||'-',tag(c.status),'R$ '+(c.valor||0).toFixed(2)]})):'<div class="ps-empty">Nenhuma</div>');h+=section('💊 Receitas ('+rxs.length+')',rxs.length?miniTable(['Data','Paciente','Produto','Dosagem','Status'],rxs.map(r=>{const pac=D.pacientes.find(p=>p.id===r.paciente_id);return[fmtDate(r.criado_em),pac?.nome||'-',r.produto_prescrito||'-',r.dosagem||'-',tag(r.status)]})):'<div class="ps-empty">Nenhuma</div>');h+=docSection(id,docs,'medico',['crm','rg_cnh','diploma','especializacao','outro']);showProfile(h)}
function openFornecedor(id){const f=D.fornecedores.find(x=>x.id===id);if(!f)return;const prods=D.produtos.filter(p=>p.fornecedor_id===id);const peds=D.pedidos.filter(o=>o.fornecedor_id===id);const tVendas=peds.reduce((s,o)=>s+(o.total||0),0);let h=profHeader(initials(f.nome_fantasia||f.razao_social),(f.nome_fantasia||f.razao_social||''),'CNPJ: '+(f.cnpj||'?'),'#2A1F0B','#F59E0B');h+=profCards([['R$ '+tVendas.toFixed(2),'Total vendas'],[prods.length,'Produtos'],[peds.length,'Pedidos'],[peds.filter(o=>o.status==='confirmado'||o.status==='pendente').length,'Pendentes']]);h+=section('📋 Dados',grid([['Razão social',f.razao_social],['Responsável',f.responsavel],['Email',f.email],['Telefone',f.telefone],['Cidade',f.cidade],['Estado',f.estado],['CEP',f.cep],['Alvará ANVISA',f.alvara_anvisa],['Cadastro',fmtDT(f.criado_em)]]));h+=section('📦 Produtos ('+prods.length+')',prods.length?miniTable(['Produto','Categoria','Preço','Estoque','Ativo'],prods.map(p=>[p.nome,p.categoria,'R$ '+p.preco.toFixed(2),p.estoque,p.ativo?'<span class="tag tg">Sim</span>':'<span class="tag tr">Não</span>'])):'<div class="ps-empty">Nenhum</div>');h+=section('🛒 Pedidos ('+peds.length+')',peds.length?miniTable(['Data','Itens','Total','Status','Rastreio'],peds.map(o=>[(fmtDate(o.criado_em)),(o.pedido_itens||[]).map(i=>i.quantidade+'x '+i.nome_produto).join(', ')||'-','R$ '+(o.total||0).toFixed(2),tag(o.status),o.rastreio||'-'])):'<div class="ps-empty">Nenhum</div>');showProfile(h)}

// UPLOAD
async function uploadDoc(uid,role){const tipo=qs('#dt-'+uid)?.value;const fi=qs('#df-'+uid);const file=fi?.files[0];if(!file)return;const st=qs('#ds-'+uid);st.textContent='Enviando...';st.style.color='var(--amber)';const path=role+'/'+uid+'/'+Date.now()+'_'+file.name;const{error}=await sb.storage.from('documentos').upload(path,file);if(error){st.textContent='Erro: '+error.message;st.style.color='var(--red)';return}const{data:u}=sb.storage.from('documentos').getPublicUrl(path);await sb.from('documentos').insert({paciente_id:uid,tipo,nome_arquivo:file.name,url:u.publicUrl,path,status:'aprovado'});st.textContent='✓ Anexado!';st.style.color='var(--green)';fi.value='';await loadAll()}

// HELPERS
function profHeader(ini,name,sub,bg,color){return'<div class="ph"><div class="pa" style="'+(bg?'background:'+bg+';':'')+(color?'color:'+color+';':'')+'">'+ini+'</div><div><h2>'+name+'</h2><div class="ps">'+sub+'</div></div><button class="bm" onclick="closeProf()">✕ Fechar</button></div>'}
function profCards(items){return'<div class="pcs">'+items.map(([n,l])=>'<div class="pc"><div class="pcn">'+n+'</div><div class="pcl">'+l+'</div></div>').join('')+'</div>'}
function section(title,body){return'<div class="sec"><div class="st">'+title+'</div>'+body+'</div>'}
function grid(fields){return'<div class="sg">'+fields.map(([l,v])=>'<div class="sf"><span class="sfl">'+l+'</span><span class="sfv">'+(v||'-')+'</span></div>').join('')+'</div>'}
function miniTable(heads,rows){let h='<table class="mt"><thead><tr>';heads.forEach(x=>h+='<th>'+x+'</th>');h+='</tr></thead><tbody>';rows.forEach(r=>{h+='<tr>';r.forEach(v=>h+='<td>'+v+'</td>');h+='</tr>'});h+='</tbody></table>';return h}
function docSection(uid,docs,role,types){let h='<div class="sec"><div class="st">📁 Documentos ('+docs.length+')</div>';if(docs.length)docs.forEach(d=>{h+='<div class="di"><span>'+d.tipo+' — '+d.nome_arquivo+'</span><span class="mono">'+fmtDT(d.enviado_em)+'</span>'+(d.url?'<a href="'+d.url+'" target="_blank" class="bm" style="font-size:11px">↗ Ver</a>':'')+'</div>'});else h+='<div class="ps-empty">Nenhum documento</div>';h+='<div style="margin-top:12px;display:flex;gap:8px;align-items:center;flex-wrap:wrap"><select id="dt-'+uid+'" class="sel-mini">'+types.map(t=>'<option value="'+t+'">'+t.replace(/_/g,' ')+'</option>').join('')+'</select><input type="file" id="df-'+uid+'" style="font-size:11px;color:var(--muted);max-width:200px"><button class="bm" style="background:var(--accent);color:#fff;border-color:var(--accent);padding:4px 12px" onclick="uploadDoc(\''+uid+'\',\''+role+'\')">📎 Anexar</button></div><div id="ds-'+uid+'" style="font-size:11px;margin-top:6px"></div></div>';return h}
function showProfile(h){qs('#profile-panel').innerHTML=h;qs('#profile-panel').style.display='block';qs('#list-panel').style.display='none'}
function closeProf(){qs('#profile-panel').style.display='none';qs('#list-panel').style.display='block'}
function filterRows(i){const q=i.value.toLowerCase();document.querySelectorAll('#tab-content tbody tr').forEach(r=>{r.style.display=(r.dataset.s||'').includes(q)?'':'none'})}
async function delRec(t,id){if(!confirm('Excluir?'))return;await sb.from(t).delete().eq('id',id);await loadAll()}
function qs(s){return document.querySelector(s)}
function fmtCol(c){const m={criado_em:'Data',valor_consulta:'Valor',nome_fantasia:'Fantasia',razao_social:'Razão Social',estado_crm:'UF',data_consulta:'Data',produto_prescrito:'Produto'};return m[c]||c.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}
function fmtVal(c,v){if(v==null)return'-';if(c.includes('criado')||c==='data_consulta'||c==='validade')return fmtDate(v);if(c==='preco'||c==='valor'||c==='valor_consulta'||c==='total')return'R$ '+Number(v).toFixed(2);if(c==='ativo')return v?'<span class="tag tg">Sim</span>':'<span class="tag tr">Não</span>';if(c==='status')return tag(v);if(c==='id')return'<span class="mono">'+String(v).slice(0,8)+'</span>';return String(v)}
function fmtDate(v){if(!v)return'-';try{return new Date(v).toLocaleDateString('pt-BR')}catch{return v}}
function fmtDT(v){if(!v)return'-';try{return new Date(v).toLocaleDateString('pt-BR')+' '+new Date(v).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}catch{return v}}
function tag(v){if(!v)return'-';const m={ativa:'g',confirmada:'g',realizada:'g',entregue:'g',pago:'g',pendente:'a',agendada:'a',confirmado:'a',enviado:'b',cancelado:'r'};return'<span class="tag t'+(m[v]||'a')+'">'+v+'</span>'}
function initials(n){return(n||'?').split(' ').filter(Boolean).map(w=>w[0]).join('').slice(0,2).toUpperCase()}
document.addEventListener('DOMContentLoaded',()=>{document.getElementById('admin-pw')?.addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin()})});
</script>

.pcs{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}.pc{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:14px;text-align:center}.pcn{font-family:var(--m);font-size:20px;font-weight:700}.pcl{font-size:10px;color:var(--mu);margin-top:2px;text-transform:uppercase}
.sec{background:var(--sf);border:1px solid var(--bd);border-radius:var(--r);padding:16px;margin-bottom:12px}.st{font-size:14px;font-weight:700;margin-bottom:12px;padding-bottom:8px;border-bottom:1px solid var(--bd)}.sg{display:grid;grid-template-columns:1fr 1fr;gap:0}.sf{display:flex;gap:8px;padding:6px 0;border-bottom:1px solid rgba(42,50,66,.4);font-size:12px}.sfl{font-weight:600;color:var(--mu);min-width:120px;flex-shrink:0}.sfv{color:var(--tx);word-break:break-all}.ps-empty{font-size:12px;color:var(--mu);padding:12px;text-align:center}
.mt{width:100%;border-collapse:collapse;font-size:11px}.mt th{padding:6px 8px;font-size:9px}.mt td{padding:6px 8px}
.di{display:flex;align-items:center;gap:12px;padding:8px;background:var(--sf2);border-radius:var(--r);margin-bottom:6px;font-size:12px}
@media(max-width:768px){.pcs{grid-template-columns:1fr 1fr}.sg{grid-template-columns:1fr}}
</style>
</head>
<body>
<div id="s-login"><div class="lb"><div style="font-size:32px;margin-bottom:12px">🔐</div><h1>Kannamaps Admin</h1><p>Painel de gerenciamento</p><input type="password" id="admin-pw" placeholder="Senha" autofocus><button onclick="adminLogin()">Entrar</button><div id="login-err"></div></div></div>
<div id="s-main">
<div class="topbar"><div class="tl"><span class="tlogo">kannamaps</span><span class="tbadge">ADMIN</span><span id="status"></span></div><div style="display:flex;gap:8px"><button class="br" onclick="loadAll()">↻ Atualizar</button><button class="bl" onclick="location.reload()">Sair</button></div></div>
<div class="stats"><div class="sc"><div class="sn" id="s-pac">0</div><div class="sl">Pacientes</div></div><div class="sc"><div class="sn" id="s-med">0</div><div class="sl">Médicos</div></div><div class="sc"><div class="sn" id="s-forn">0</div><div class="sl">Fornecedores</div></div><div class="sc"><div class="sn" id="s-prod">0</div><div class="sl">Produtos</div></div><div class="sc"><div class="sn" id="s-ped">0</div><div class="sl">Pedidos</div></div><div class="sc"><div class="sn" id="s-con">0</div><div class="sl">Consultas</div></div><div class="sc"><div class="sn" id="s-rec">0</div><div class="sl">Receitas</div></div><div class="sc"><div class="sn" id="s-rev" style="color:var(--gn)">R$ 0</div><div class="sl">Receita total</div></div></div>
<div class="tabs"><div class="tab active" data-tab="pacientes" onclick="switchTab('pacientes')">👤 Pacientes</div><div class="tab" data-tab="medicos" onclick="switchTab('medicos')">🩺 Médicos</div><div class="tab" data-tab="fornecedores" onclick="switchTab('fornecedores')">📦 Fornecedores</div><div class="tab" data-tab="produtos" onclick="switchTab('produtos')">🌿 Produtos</div><div class="tab" data-tab="pedidos" onclick="switchTab('pedidos')">🛒 Pedidos</div><div class="tab" data-tab="consultas" onclick="switchTab('consultas')">📅 Consultas</div><div class="tab" data-tab="receitas" onclick="switchTab('receitas')">📋 Receitas</div></div>
<div id="list-panel"><div id="tab-content"></div></div>
<div id="profile-panel"></div>
</div>
</body>
