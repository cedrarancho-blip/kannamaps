<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Kannamaps — Painel Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== SUPABASE ADMIN (Service Role Key - bypasses RLS) =====
const SUPA_URL='https://dfxrdxfjqumajxikykay.supabase.co';
const SUPA_SERVICE='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImRmeHJkeGZqcXVtYWp4aWt5a2F5Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NTY5ODAwOCwiZXhwIjoyMDkxMjc0MDA4fQ.GVFP8yHCJDE0XYg-oj5LT62lcjpWBE0aWQ20dg9LCk4';
const{createClient}=supabase;
const sb=createClient(SUPA_URL,SUPA_SERVICE);

const ADMIN_PASS='kannamaps2026';
let isAuth=false;
let data={pacientes:[],medicos:[],fornecedores:[],produtos:[],pedidos:[],consultas:[],receitas:[]};

// ===== AUTH =====
function adminLogin(){
  const pw=document.getElementById('admin-pw').value;
  if(pw===ADMIN_PASS){isAuth=true;document.getElementById('s-login').style.display='none';document.getElementById('s-main').style.display='flex';loadAll()}
  else{document.getElementById('login-err').textContent='Senha incorreta';setTimeout(()=>document.getElementById('login-err').textContent='',3000)}
}

// ===== LOAD ALL DATA =====
async function loadAll(){
  showStatus('Carregando dados...');
  const[p,m,f,pr,pe,c,r]=await Promise.all([
    sb.from('pacientes').select('*').order('criado_em',{ascending:false}),
    sb.from('medicos').select('*').order('criado_em',{ascending:false}),
    sb.from('fornecedores').select('*').order('criado_em',{ascending:false}),
    sb.from('produtos').select('*').order('criado_em',{ascending:false}),
    sb.from('pedidos').select('*,pedido_itens(*)').order('criado_em',{ascending:false}),
    sb.from('consultas').select('*').order('criado_em',{ascending:false}),
    sb.from('receitas').select('*').order('criado_em',{ascending:false})
  ]);
  data.pacientes=p.data||[];data.medicos=m.data||[];data.fornecedores=f.data||[];
  data.produtos=pr.data||[];data.pedidos=pe.data||[];data.consultas=c.data||[];data.receitas=r.data||[];
  renderStats();renderTab(currentTab);showStatus('');
}

// ===== STATS =====
function renderStats(){
  document.getElementById('s-pac').textContent=data.pacientes.length;
  document.getElementById('s-med').textContent=data.medicos.length;
  document.getElementById('s-forn').textContent=data.fornecedores.length;
  document.getElementById('s-prod').textContent=data.produtos.length;
  document.getElementById('s-ped').textContent=data.pedidos.length;
  document.getElementById('s-con').textContent=data.consultas.length;
  document.getElementById('s-rec').textContent=data.receitas.length;
  const rev=data.pedidos.reduce((s,p)=>s+(p.total||0),0);
  document.getElementById('s-rev').textContent='R$ '+rev.toFixed(2);
}

// ===== TABS =====
let currentTab='pacientes';
function switchTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  renderTab(tab);
}
function renderTab(tab){
  const c=document.getElementById('tab-content');
  switch(tab){
    case'pacientes':c.innerHTML=renderTable(data.pacientes,['nome','email','cpf','telefone','sintomas','uso_cbd','tem_receita','criado_em'],'pacientes');break;
    case'medicos':c.innerHTML=renderTable(data.medicos,['nome','crm','estado_crm','especialidade','email','telefone','valor_consulta','total_consultas','criado_em'],'medicos');break;
    case'fornecedores':c.innerHTML=renderTable(data.fornecedores,['razao_social','nome_fantasia','cnpj','responsavel','email','telefone','cidade','estado','alvara_anvisa','criado_em'],'fornecedores');break;
    case'produtos':c.innerHTML=renderTable(data.produtos,['nome','categoria','preco','estoque','fornecedor','volume','concentracao','ativo','requer_anvisa','criado_em'],'produtos');break;
    case'pedidos':c.innerHTML=renderPedidos();break;
    case'consultas':c.innerHTML=renderTable(data.consultas,['paciente_id','medico','especialidade','data_consulta','horario','status','valor','pagamento_status','criado_em'],'consultas');break;
    case'receitas':c.innerHTML=renderTable(data.receitas,['paciente_id','medico_id','diagnostico','produto_prescrito','dosagem','posologia','duracao_tratamento','status','validade','criado_em'],'receitas');break;
  }
}

// ===== TABLE RENDERER =====
function renderTable(rows,cols,tableName){
  if(!rows.length)return '<div class="empty">Nenhum registro encontrado</div>';
  const search='<input class="search" placeholder="Buscar..." oninput="filterTable(this,\''+tableName+'\')" id="search-'+tableName+'">';
  let h='<div class="tbl-wrap">'+search+'<div class="tbl-scroll"><table><thead><tr><th>#</th>';
  cols.forEach(c=>h+='<th>'+formatCol(c)+'</th>');
  h+='<th>Ações</th></tr></thead><tbody>';
  rows.forEach((r,i)=>{
    h+='<tr data-search="'+cols.map(c=>String(r[c]||'')).join(' ').toLowerCase()+'">';
    h+='<td class="mono">'+(i+1)+'</td>';
    cols.forEach(c=>{
      let v=r[c];
      if(c==='criado_em'&&v)v=new Date(v).toLocaleDateString('pt-BR')+' '+new Date(v).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
      else if(c==='data_consulta'&&v)v=new Date(v).toLocaleDateString('pt-BR');
      else if(c==='validade'&&v)v=new Date(v).toLocaleDateString('pt-BR');
      else if(c==='preco'&&v)v='R$ '+Number(v).toFixed(2);
      else if(c==='valor'&&v)v='R$ '+Number(v).toFixed(2);
      else if(c==='valor_consulta'&&v)v='R$ '+Number(v).toFixed(2);
      else if(c==='ativo')v=v?'<span class="tag tag-g">Sim</span>':'<span class="tag tag-r">Não</span>';
      else if(c==='requer_anvisa')v=v?'<span class="tag tag-a">Sim</span>':'Não';
      else if(c==='status')v='<span class="tag tag-'+(v==='ativa'||v==='confirmada'||v==='realizada'||v==='entregue'?'g':v==='pendente'||v==='agendada'?'a':'r')+'">'+((v||'-'))+'</span>';
      else if(c==='pagamento_status')v='<span class="tag tag-'+(v==='pago'?'g':'a')+'">'+((v||'-'))+'</span>';
      else if((c==='paciente_id'||c==='medico_id')&&v)v='<span class="mono" title="'+v+'">'+v.slice(0,8)+'...</span>';
      h+='<td>'+(v??'-')+'</td>';
    });
    h+='<td><button class="btn-mini" onclick="viewRecord(\''+tableName+'\',\''+r.id+'\')">👁️</button><button class="btn-mini btn-del" onclick="deleteRecord(\''+tableName+'\',\''+r.id+'\')">🗑️</button></td>';
    h+='</tr>';
  });
  h+='</tbody></table></div></div>';
  h+='<div class="tbl-footer">'+rows.length+' registros</div>';
  return h;
}
function renderPedidos(){
  if(!data.pedidos.length)return '<div class="empty">Nenhum pedido</div>';
  let h='<div class="tbl-wrap"><div class="tbl-scroll"><table><thead><tr><th>#</th><th>ID</th><th>Paciente</th><th>Status</th><th>Total</th><th>Itens</th><th>Rastreio</th><th>Data</th><th>Ações</th></tr></thead><tbody>';
  data.pedidos.forEach((p,i)=>{
    const items=(p.pedido_itens||[]).map(it=>it.quantidade+'x '+(it.nome_produto||'?')).join(', ')||'-';
    h+='<tr><td>'+(i+1)+'</td><td class="mono">'+p.id.slice(0,8)+'</td><td class="mono">'+(p.paciente_id?p.paciente_id.slice(0,8):'?')+'</td>';
    h+='<td><span class="tag tag-'+(p.status==='entregue'?'g':p.status==='enviado'?'b':p.status==='confirmado'?'a':'r')+'">'+(p.status||'pendente')+'</span></td>';
    h+='<td>R$ '+(p.total||0).toFixed(2)+'</td><td>'+items+'</td><td>'+(p.rastreio||'-')+'</td>';
    h+='<td>'+new Date(p.criado_em).toLocaleDateString('pt-BR')+'</td>';
    h+='<td><button class="btn-mini" onclick="viewRecord(\'pedidos\',\''+p.id+'\')">👁️</button>';
    if(p.status!=='entregue')h+='<select class="sel-mini" onchange="updatePedidoStatus(\''+p.id+'\',this.value)"><option value="">Mudar status</option><option value="confirmado">Confirmado</option><option value="enviado">Enviado</option><option value="entregue">Entregue</option><option value="cancelado">Cancelado</option></select>';
    h+='</td></tr>';
  });
  h+='</tbody></table></div></div><div class="tbl-footer">'+data.pedidos.length+' pedidos</div>';
  return h;
}

// ===== ACTIONS =====
function filterTable(input,tableName){
  const q=input.value.toLowerCase();
  const rows=document.querySelectorAll('#tab-content tbody tr');
  rows.forEach(r=>{r.style.display=(r.dataset.search||'').includes(q)?'':'none'});
}
async function viewRecord(table,id){
  const row=(data[table]||[]).find(r=>r.id===id);
  if(!row)return;
  const modal=document.getElementById('modal');
  const body=document.getElementById('modal-body');
  body.innerHTML='<div class="modal-title">'+formatCol(table)+' — '+id.slice(0,12)+'</div>';
  body.innerHTML+=Object.entries(row).map(([k,v])=>{
    if(k==='pedido_itens'&&Array.isArray(v))v=v.map(i=>i.quantidade+'x '+i.nome_produto+' R$'+i.subtotal).join('<br>');
    else if(typeof v==='object'&&v!==null)v=JSON.stringify(v,null,2);
    return '<div class="field"><span class="field-label">'+k+'</span><span class="field-value">'+(v??'null')+'</span></div>';
  }).join('');
  modal.style.display='flex';
}
function closeModal(){document.getElementById('modal').style.display='none'}
async function deleteRecord(table,id){
  if(!confirm('Tem certeza que deseja excluir este registro?'))return;
  showStatus('Excluindo...');
  await sb.from(table).delete().eq('id',id);
  await loadAll();
}
async function updatePedidoStatus(id,status){
  if(!status)return;
  showStatus('Atualizando...');
  const updates={status};
  if(status==='enviado')updates.data_envio=new Date().toISOString();
  if(status==='entregue')updates.data_entrega=new Date().toISOString();
  await sb.from('pedidos').update(updates).eq('id',id);
  await loadAll();
}

// ===== UTILS =====
function formatCol(c){return c.replace(/_/g,' ').replace(/\b\w/g,l=>l.toUpperCase())}
function showStatus(msg){document.getElementById('status').textContent=msg}
function el(id){return document.getElementById(id)}

// Enter key on password
document.addEventListener('DOMContentLoaded',()=>{
  document.getElementById('admin-pw').addEventListener('keydown',e=>{if(e.key==='Enter')adminLogin()});
});
</script>
<style>
:root{--bg:#0B0E11;--surface:#151921;--surface2:#1C2330;--border:#2A3242;--text:#E4E8EF;--muted:#7A869A;--accent:#7B2FBE;--accent2:#9B4FDE;--green:#22C55E;--red:#EF4444;--amber:#F59E0B;--blue:#3B82F6;--r:8px;--font:'DM Sans',sans-serif;--mono:'Space Mono',monospace}
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:var(--bg);color:var(--text);font-family:var(--font);font-size:14px;min-height:100vh}
::selection{background:var(--accent);color:#fff}
::-webkit-scrollbar{width:6px;height:6px}::-webkit-scrollbar-track{background:var(--surface)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* LOGIN */
#s-login{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--bg)}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;text-align:center}
.login-box h1{font-size:24px;margin-bottom:6px;font-weight:700}.login-box p{color:var(--muted);font-size:13px;margin-bottom:24px}
.login-box input{width:100%;padding:12px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-family:var(--mono);font-size:14px;outline:none;margin-bottom:12px;text-align:center;letter-spacing:2px}
.login-box input:focus{border-color:var(--accent)}
.login-box button{width:100%;padding:12px;border:none;border-radius:var(--r);background:var(--accent);color:#fff;font-weight:600;font-size:14px;cursor:pointer;transition:all .15s}.login-box button:hover{background:var(--accent2)}
#login-err{color:var(--red);font-size:12px;margin-top:8px;min-height:18px}

/* MAIN LAYOUT */
#s-main{display:none;flex-direction:column;min-height:100vh}
.topbar{display:flex;align-items:center;justify-content:space-between;padding:12px 24px;border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:0;z-index:10}
.topbar-left{display:flex;align-items:center;gap:12px}
.topbar-logo{font-family:var(--mono);font-weight:700;font-size:16px;color:var(--accent)}
.topbar-badge{background:var(--accent);color:#fff;font-size:10px;padding:2px 8px;border-radius:100px;font-weight:600}
#status{color:var(--amber);font-size:12px;font-family:var(--mono)}
.btn-refresh{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:6px 14px;border-radius:var(--r);font-size:12px;cursor:pointer;font-weight:600;transition:all .15s}.btn-refresh:hover{border-color:var(--accent);color:var(--accent)}
.btn-logout{background:transparent;border:1px solid var(--border);color:var(--red);padding:6px 14px;border-radius:var(--r);font-size:12px;cursor:pointer;font-weight:600}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;padding:20px 24px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;text-align:center}
.stat-num{font-family:var(--mono);font-size:28px;font-weight:700;color:var(--text)}.stat-lbl{font-size:11px;color:var(--muted);margin-top:2px;text-transform:uppercase;letter-spacing:.5px}

/* TABS */
.tabs{display:flex;gap:2px;padding:0 24px;border-bottom:1px solid var(--border);background:var(--surface);overflow-x:auto}
.tab{padding:10px 16px;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;white-space:nowrap;transition:all .15s}
.tab:hover{color:var(--text)}.tab.active{color:var(--accent);border-bottom-color:var(--accent)}

/* TABLE */
.tbl-wrap{padding:16px 24px}
.search{width:100%;padding:10px 16px;border-radius:var(--r);border:1px solid var(--border);background:var(--surface2);color:var(--text);font-size:13px;outline:none;margin-bottom:12px}.search:focus{border-color:var(--accent)}
.tbl-scroll{overflow-x:auto;border:1px solid var(--border);border-radius:var(--r)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--surface2)}
th{padding:10px 12px;text-align:left;font-weight:600;color:var(--muted);text-transform:uppercase;font-size:10px;letter-spacing:.5px;white-space:nowrap;border-bottom:1px solid var(--border)}
td{padding:8px 12px;border-bottom:1px solid var(--border);max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
tr:hover{background:var(--surface2)}
.mono{font-family:var(--mono);font-size:11px;color:var(--muted)}
.tag{padding:2px 8px;border-radius:100px;font-size:10px;font-weight:600;display:inline-block}
.tag-g{background:rgba(34,197,94,.15);color:var(--green)}.tag-r{background:rgba(239,68,68,.15);color:var(--red)}.tag-a{background:rgba(245,158,11,.15);color:var(--amber)}.tag-b{background:rgba(59,130,246,.15);color:var(--blue)}
.btn-mini{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:4px;cursor:pointer;font-size:11px;margin-right:4px}.btn-mini:hover{border-color:var(--accent)}.btn-del:hover{border-color:var(--red)}
.sel-mini{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:4px 6px;border-radius:4px;font-size:10px;cursor:pointer}
.tbl-footer{text-align:right;padding:8px 0;font-size:11px;color:var(--muted);font-family:var(--mono)}
.empty{text-align:center;padding:60px;color:var(--muted);font-size:14px}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:100;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;max-width:600px;width:100%;max-height:80vh;overflow-y:auto;padding:24px}
.modal-title{font-size:16px;font-weight:700;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.field{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid rgba(42,50,66,.5);font-size:12px}
.field-label{font-weight:600;color:var(--muted);min-width:140px;flex-shrink:0;font-family:var(--mono);font-size:11px}
.field-value{color:var(--text);word-break:break-all}
.modal-close{position:absolute;top:16px;right:16px;background:var(--surface2);border:1px solid var(--border);color:var(--text);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="s-login">
<div class="login-box">
<div style="font-size:32px;margin-bottom:12px">🔐</div>
<h1>Kannamaps Admin</h1>
<p>Painel de gerenciamento da plataforma</p>
<input type="password" id="admin-pw" placeholder="Senha de admin" autofocus>
<button onclick="adminLogin()">Entrar</button>
<div id="login-err"></div>
</div>
</div>

<!-- MAIN -->
<div id="s-main">
<div class="topbar">
<div class="topbar-left">
<span class="topbar-logo">kannamaps</span>
<span class="topbar-badge">ADMIN</span>
<span id="status"></span>
</div>
<div style="display:flex;gap:8px;align-items:center">
<button class="btn-refresh" onclick="loadAll()">↻ Atualizar</button>
<button class="btn-logout" onclick="location.reload()">Sair</button>
</div>
</div>

<div class="stats">
<div class="stat-card"><div class="stat-num" id="s-pac">0</div><div class="stat-lbl">Pacientes</div></div>
<div class="stat-card"><div class="stat-num" id="s-med">0</div><div class="stat-lbl">Médicos</div></div>
<div class="stat-card"><div class="stat-num" id="s-forn">0</div><div class="stat-lbl">Fornecedores</div></div>
<div class="stat-card"><div class="stat-num" id="s-prod">0</div><div class="stat-lbl">Produtos</div></div>
<div class="stat-card"><div class="stat-num" id="s-ped">0</div><div class="stat-lbl">Pedidos</div></div>
<div class="stat-card"><div class="stat-num" id="s-con">0</div><div class="stat-lbl">Consultas</div></div>
<div class="stat-card"><div class="stat-num" id="s-rec">0</div><div class="stat-lbl">Receitas</div></div>
<div class="stat-card"><div class="stat-num" id="s-rev" style="color:var(--green)">R$ 0</div><div class="stat-lbl">Receita total</div></div>
</div>

<div class="tabs">
<div class="tab active" data-tab="pacientes" onclick="switchTab('pacientes')">👤 Pacientes</div>
<div class="tab" data-tab="medicos" onclick="switchTab('medicos')">🩺 Médicos</div>
<div class="tab" data-tab="fornecedores" onclick="switchTab('fornecedores')">📦 Fornecedores</div>
<div class="tab" data-tab="produtos" onclick="switchTab('produtos')">🌿 Produtos</div>
<div class="tab" data-tab="pedidos" onclick="switchTab('pedidos')">🛒 Pedidos</div>
<div class="tab" data-tab="consultas" onclick="switchTab('consultas')">📅 Consultas</div>
<div class="tab" data-tab="receitas" onclick="switchTab('receitas')">📋 Receitas</div>
</div>

<div id="tab-content"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
<div class="modal-box" style="position:relative">
<button class="modal-close" onclick="closeModal()">✕</button>
<div id="modal-body"></div>
</div>
</div>

</body>
</html>
